name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4

      - name: Checkout Code
        if: ${{ steps.release.outputs['packages/jsonforms-primevue--release_created'] == 'true' }}
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ steps.release.outputs['packages/jsonforms-primevue--release_created'] == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Enable Corepack
        if: ${{ steps.release.outputs['packages/jsonforms-primevue--release_created'] == 'true' }}
        run: corepack enable

      - name: Install Dependencies
        if: ${{ steps.release.outputs['packages/jsonforms-primevue--release_created'] == 'true' }}
        run: yarn install --immutable

      - name: Build Library
        if: ${{ steps.release.outputs['packages/jsonforms-primevue--release_created'] == 'true' }}
        run: yarn workspace @unchartedsoftware/jsonforms-primevue run build

      - name: Publish to npm
        if: ${{ steps.release.outputs['packages/jsonforms-primevue--release_created'] == 'true' }}
        working-directory: packages/jsonforms-primevue
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
