name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      jsonforms_primevue_release_created: ${{ steps.release.outputs['packages/jsonforms-primevue--release_created'] }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.jsonforms_primevue_release_created == 'true' }}
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Build Library
        run: yarn workspace @uncharted.software/jsonforms-primevue run build

      - name: Publish to npm
        working-directory: packages/jsonforms-primevue
        run: npm publish --access public --provenance
